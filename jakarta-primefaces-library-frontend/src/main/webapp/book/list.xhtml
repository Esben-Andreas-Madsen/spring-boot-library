<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">
        Library - Book List
    </ui:define>

    <ui:define name="content">
        <div>

        <h:form id="bookForm">

            <p:toolbar style="margin-top: 1rem;">
                <p:toolbarGroup>

                    <p:commandButton value="New"
                                     icon="pi pi-plus"
                                     actionListener="#{bookListBean.openNew}"
                                     update=":dialogs:book-content"
                                     oncomplete="PF('bookDialog').show()"
                                     styleClass="ui-button-success">
                        <p:resetInput target=":dialogs:book-content"/>
                    </p:commandButton>

                    <p:commandButton id="delete-books-button"
                                     style="margin-left: 0.5rem;"
                                     value="Delete"
                                     icon="pi pi-trash"
                                     actionListener="#{bookListBean.deleteSelectedBooks}"
                                     disabled="#{empty bookListBean.selectedBooks}"
                                     styleClass="ui-button-danger">
                        <p:confirm header="Confirmation"
                                   message="Delete selected books?"
                                   icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>

                </p:toolbarGroup>
            </p:toolbar>


            <p:dataTable id="dt-books"
                         widgetVar="dtBooks"
                         var="book"
                         value="#{bookListBean.books}"
                         allowUnsorting="true"
                         lazy="true"
                         paginator="true"
                         rows="10"
                         rowKey="#{book.id}"
                         selection="#{bookListBean.selectedBooks}"
                         selectionRowMode="add">


                <p:column selectionBox="true"/>

            <p:column headerText="Title"
                      field="title"
                      sortBy="#{book.title}"
                      filterBy="#{book.title}"
                      filterMatchMode="contains">
                #{book.title}
            </p:column>

            <p:column headerText="Authors">
                <ui:repeat value="#{bookListBean.getAuthorsByIds(book.authorIds)}" var="author">
                    #{author.name}
                </ui:repeat>
            </p:column>

            <p:column headerText="Genres">
                <ui:repeat value="#{bookListBean.getGenresByIds(book.genreIds)}" var="genre">
                    #{genre.name}
                </ui:repeat>
            </p:column>

            <p:column headerText="Language"
                      field="language"
                      filterBy="#{book.language}"
                      filterMatchMode="contains">
                #{book.language}
            </p:column>

            <p:column headerText="Published"
                      filterBy="#{book.publishedYear}"
                      field="publishedYear">

                #{book.publishedYear}

                <f:facet name="filter">
                    <p:panelGrid columns="2">
                        <p:inputNumber value="#{bookListBean.filter.publishedYearFrom}" placeholder="From">
                            <p:ajax event="change"
                                    oncomplete="PF('dtBooks').filter()"
                                    delay="500"/>
                        </p:inputNumber>

                        <p:inputNumber value="#{bookListBean.filter.publishedYearTo}" placeholder="To">
                            <p:ajax event="change"
                                    oncomplete="PF('dtBooks').filter()"
                                    delay="500"/>
                        </p:inputNumber>
                    </p:panelGrid>
                </f:facet>

            </p:column>

            <p:column headerText="ISBN"
                      field="isbn"
                      filterMatchMode="equals"
                      filterBy="#{book.isbn}">
                #{book.isbn}
            </p:column>

            <p:column headerText="Pages"
                      filterBy="#{book.pages}"
                      field="pages">

                #{book.pages}

                <f:facet name="filter">
                    <p:panelGrid columns="2" style="width:100%">
                        <p:inputNumber value="#{bookListBean.filter.pagesFrom}" placeholder="From">
                            <p:ajax event="change"
                                    oncomplete="PF('dtBooks').filter()"
                                    delay="500"/>
                        </p:inputNumber>

                        <p:inputNumber value="#{bookListBean.filter.pagesTo}" placeholder="To">
                            <p:ajax event="change"
                                    oncomplete="PF('dtBooks').filter()"
                                    delay="500"/>
                        </p:inputNumber>
                    </p:panelGrid>
                </f:facet>

            </p:column>


                <p:column>

                    <p:commandButton icon="pi pi-pencil"
                                     update=":dialogs:book-content"
                                     oncomplete="PF('bookDialog').show()"
                                     process="@this"
                                     styleClass="ui-button-success rounded-button">

                        <f:setPropertyActionListener
                                value="#{book}"
                                target="#{bookListBean.selectedBook}"/>

                        <p:resetInput target=":dialogs:book-content"/>

                    </p:commandButton>

                    <p:commandButton icon="pi pi-trash"
                                     process="@this"
                                     oncomplete="PF('deleteBookDialog').show()"
                                     class="ui-button-warning rounded-button">

                        <f:setPropertyActionListener value="#{book}"
                                                     target="#{bookListBean.selectedBook}"/>

                    </p:commandButton>

                </p:column>

        </p:dataTable>

        </h:form>


        <h:form id="dialogs">

            <p:dialog header="Book Details"
                      widgetVar="bookDialog"
                      modal="true"
                      responsive="true"
                      showEffect="fade">

                <p:outputPanel id="book-content" class="ui-fluid">

                    <div class="field">
                        <p:outputLabel for="title" value="Title"/>
                        <p:inputText id="title"
                                     value="#{bookListBean.selectedBook.title}"/>
                    </div>

                    <div class="field">
                        <p:outputLabel for="language" value="Language"/>
                        <p:inputText id="language"
                                     value="#{bookListBean.selectedBook.language}"/>
                    </div>

                    <div class="field">
                        <p:outputLabel for="year" value="Published"/>
                        <p:inputNumber id="year"
                                       value="#{bookListBean.selectedBook.publishedYear}"/>
                    </div>

                    <div class="field">
                        <p:outputLabel for="isbn" value="ISBN"/>
                        <p:inputText id="isbn"
                                     value="#{bookListBean.selectedBook.isbn}"/>
                    </div>

                    <div class="field">
                        <p:outputLabel for="pages" value="Pages"/>
                        <p:inputNumber id="pages"
                                       value="#{bookListBean.selectedBook.pages}"/>
                    </div>

                </p:outputPanel>

                <f:facet name="footer">

                    <p:commandButton value="Save"
                                     icon="pi pi-check"
                                     actionListener="#{bookListBean.saveBook}"
                                     update="book-content"
                                     process="book-content @this"/>

                    <p:commandButton value="Cancel"
                                     icon="pi pi-times"
                                     onclick="PF('bookDialog').hide()"
                                     type="button"
                                     class="ui-button-secondary"/>

                </f:facet>

            </p:dialog>

            <p:confirmDialog widgetVar="deleteBookDialog"
                             header="Confirm"
                             message="Delete this book?"
                             width="300"
                             height="auto"
                             showEffect="fade"
                             hideEffect="fade"
                             severity="warn">

                <p:commandButton value="Yes"
                                 icon="pi pi-check"
                                 actionListener="#{bookListBean.deleteBook}"
                                 process="@this"
                                 oncomplete="PF('deleteBookDialog').hide()"/>

                <p:commandButton value="No"
                                 type="button"
                                 class="ui-button-secondary"
                                 icon="pi pi-times"
                                 onclick="PF('deleteBookDialog').hide()"/>

            </p:confirmDialog>

            <p:confirmDialog global="true" showEffect="fade" width="300">
                <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                                 icon="pi pi-times" />
            </p:confirmDialog>

        </h:form>

        </div>

    </ui:define>

</ui:composition>
</html>
