<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="header">
        <title>Book List</title>
    </ui:define>

    <ui:define name="content">
        <div>

            <h:form id="bookForm">

                <p:dataTable id="dt-books"
                             widgetVar="dtBooks"
                             var="book"
                             value="#{bookBean.dataModel}"
                             lazy="true"
                             paginator="true"
                             rows="10"
                             rowKey="#{book.id}"
                             filterDelay="500"
                             allowUnsorting="true">

                    <p:column headerText="Title"
                              field="title"
                              sortBy="#{book.title}"
                              filterBy="#{book.title}"
                              filterMatchMode="contains">
                        #{book.title}
                    </p:column>

                    <p:column headerText="Authors">
                        <ui:repeat value="#{bookBean.getAuthorsByIds(book.authorIds)}"
                                   var="author"
                                   varStatus="s">
                            #{author.name}#{!s.last ? ', ' : ''}
                        </ui:repeat>
                    </p:column>

                    <p:column headerText="Genres">
                        <ui:repeat value="#{bookBean.getGenresByIds(book.genreIds)}"
                                   var="genre"
                                   varStatus="s">
                            #{genre.name}#{!s.last ? ', ' : ''}
                        </ui:repeat>
                    </p:column>

                    <p:column headerText="Language"
                              field="language"
                              filterBy="#{book.language}"
                              filterMatchMode="contains">
                        #{book.language}
                    </p:column>

                    <p:column headerText="Published"
                              field="publishedYear">

                        #{book.publishedYear}

                        <f:facet name="filter">
                            <div style="display:flex; flex-direction:column; gap:0.5rem;">

                                <p:inputNumber value="#{bookBean.filter.publishedYearFrom}"
                                               placeholder="From">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                                <p:inputNumber value="#{bookBean.filter.publishedYearTo}"
                                               placeholder="To">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                            </div>
                        </f:facet>

                    </p:column>

                    <p:column headerText="ISBN"
                              field="isbn"
                              filterBy="#{book.isbn}"
                              filterMatchMode="equals">
                        #{book.isbn}
                    </p:column>

                    <p:column headerText="Pages"
                              field="pages">

                        #{book.pages}

                        <f:facet name="filter">
                            <div style="display:flex; flex-direction:column; gap:0.5rem;">

                                <p:inputNumber value="#{bookBean.filter.pagesFrom}"
                                               placeholder="From">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                                <p:inputNumber value="#{bookBean.filter.pagesTo}"
                                               placeholder="To">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                            </div>
                        </f:facet>

                    </p:column>

                    <p:column headerText="Actions" style="width:120px">

                        <p:button icon="pi pi-pencil"
                                  outcome="/book/edit"
                                  title="Edit">
                            <f:param name="id" value="#{book.id}" />
                        </p:button>

                        <p:commandButton icon="pi pi-trash"
                                         action="#{bookBean.delete}"
                                         update="dt-books"
                                         styleClass="ui-button-danger"
                                         process="@this">

                            <f:setPropertyActionListener value="#{book}" target="#{bookBean.selected}"/>
                        </p:commandButton>

                    </p:column>

                </p:dataTable>

                <p:commandButton icon="pi pi-trash"
                                 action="#{bookBean.delete}"
                                 update="dt-books"
                                 styleClass="ui-button-danger">

                    <f:setPropertyActionListener value="#{book}" target="#{bookBean.selected}"/>

                    <p:confirm header="Delete?"
                               message="Are you sure you want to delete this book?"
                               icon="pi pi-exclamation-triangle"/>
                </p:commandButton>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                    <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes"/>
                    <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"/>
                </p:confirmDialog>

            </h:form>

        </div>
    </ui:define>

</ui:composition>
</html>
