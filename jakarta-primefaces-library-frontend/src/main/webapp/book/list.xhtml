<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">
        Library - Book List
    </ui:define>

    <ui:define name="content">
        <div>

            <h:form id="bookForm">

                <p:dataTable id="dt-books"
                             widgetVar="dtBooks"
                             var="book"
                             value="#{bookListBean.books}"
                             allowUnsorting="true"
                             lazy="true"
                             paginator="true"
                             rows="10"
                             rowKey="#{book.id}">

                    <p:column headerText="Title"
                              field="title"
                              sortBy="#{book.title}"
                              filterBy="#{book.title}"
                              filterMatchMode="contains">
                        #{book.title}
                    </p:column>

                    <p:column headerText="Authors">
                        <ui:repeat value="#{bookListBean.getAuthorsByIds(book.authorIds)}" var="author">
                            #{author.name}
                        </ui:repeat>
                    </p:column>

                    <p:column headerText="Genres">
                        <ui:repeat value="#{bookListBean.getGenresByIds(book.genreIds)}" var="genre">
                            #{genre.name}
                        </ui:repeat>
                    </p:column>

                    <p:column headerText="Language"
                              field="language"
                              filterBy="#{book.language}"
                              filterMatchMode="contains">
                        #{book.language}
                    </p:column>

                    <p:column headerText="Published"
                              filterBy="#{book.publishedYear}"
                              field="publishedYear">

                        #{book.publishedYear}

                        <f:facet name="filter">
                            <div class="ui-column-filter"
                                 style="display:flex; flex-direction:column; gap:0.5rem;">

                                <p:inputNumber value="#{bookListBean.filter.publishedYearFrom}"
                                               placeholder="From">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                                <p:inputNumber value="#{bookListBean.filter.publishedYearTo}"
                                               placeholder="To">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                            </div>
                        </f:facet>

                    </p:column>

                    <p:column headerText="ISBN"
                              field="isbn"
                              filterMatchMode="equals"
                              filterBy="#{book.isbn}">
                        #{book.isbn}
                    </p:column>

                    <p:column headerText="Pages"
                              filterBy="#{book.pages}"
                              field="pages">

                        #{book.pages}

                        <f:facet name="filter">
                            <div class="ui-column-filter"
                                 style="display:flex; flex-direction:column; gap:0.5rem;">

                                <p:inputNumber value="#{bookListBean.filter.pagesFrom}"
                                               placeholder="From">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                                <p:inputNumber value="#{bookListBean.filter.pagesTo}"
                                               placeholder="To">
                                    <p:ajax event="change"
                                            oncomplete="PF('dtBooks').filter()"
                                            delay="500"/>
                                </p:inputNumber>

                            </div>
                        </f:facet>

                    </p:column>

                </p:dataTable>

            </h:form>

        </div>
    </ui:define>

</ui:composition>
</html>
