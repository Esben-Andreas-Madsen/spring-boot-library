<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">
        Library - Book List
    </ui:define>

    <ui:define name="content">

        <h:form id="bookForm">

        <p:dataTable value="#{bookListBean.books}"
                     widgetVar="booksTable"
                     var="book"
                     paginator="true"
                     rows="10"
                     lazy="true"
                     rowKey="#{book.id}"
                     emptyMessage="No books found"
                     filterDisplay="row">

            <!--
            <p:column headerText="ID">
                #{book.id}
            </p:column>
            -->

            <p:column headerText="Title"
                      field="title"
                      filterBy="#{book.title}"
                      filterMatchMode="contains">
                #{book.title}
            </p:column>

            <!--
            <p:column headerText="Authors">
                <ui:repeat value="#{bookListBean.getAuthorsByIds(book.authorIds)}" var="author">
                    #{author.name}
                </ui:repeat>
            </p:column>

            <p:column headerText="Genres">
                <ui:repeat value="#{bookListBean.getGenresByIds(book.genreIds)}" var="genre">
                    #{genre.name}
                </ui:repeat>
            </p:column>
            -->

            <p:column headerText="Language"
                      field="language"
                      filterBy="#{book.language}"
                      filterMatchMode="contains">
                #{book.language}
            </p:column>

            <p:column headerText="Published"
                      field="publishedYear">

                #{book.publishedYear}

                <f:facet name="filter">
                    <p:panelGrid columns="2" style="width:50%">
                        <p:inputNumber value="#{bookListBean.yearFrom}" placeholder="From">
                            <p:ajax event="keyup"
                                    oncomplete="PF('booksTable').filter()"
                                    delay="500"/>
                        </p:inputNumber>

                        <p:inputNumber value="#{bookListBean.yearTo}" placeholder="To">
                            <p:ajax event="keyup"
                                    oncomplete="PF('booksTable').filter()"
                                    delay="500"/>
                        </p:inputNumber>
                    </p:panelGrid>
                </f:facet>

            </p:column>

            <p:column headerText="ISBN"
                      field="isbn"
                      filterMatchMode="equals"
                      filterBy="#{book.isbn}">
                #{book.isbn}
            </p:column>

            <p:column headerText="Pages" field="pages">

                #{book.pages}

                <f:facet name="filter">
                    <p:panelGrid columns="2" style="width:50%">
                        <p:inputNumber value="#{bookListBean.pagesFrom}" placeholder="From">
                            <p:ajax event="keyup"
                                    oncomplete="PF('booksTable').filter()"
                                    delay="500"/>
                        </p:inputNumber>

                        <p:inputNumber value="#{bookListBean.pagesTo}" placeholder="To">
                            <p:ajax event="keyup"
                                    oncomplete="PF('booksTable').filter()"
                                    delay="500"/>
                        </p:inputNumber>
                    </p:panelGrid>
                </f:facet>

            </p:column>

        </p:dataTable>

        </h:form>

    </ui:define>

</ui:composition>
</html>
