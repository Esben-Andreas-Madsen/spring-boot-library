<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<h:head>

    <h:outputStylesheet library="primefaces"
                        name="themes/#{themeBean.theme}/theme.css"/>

    <h:outputStylesheet library="webjars" name="primeflex/3.3.1/primeflex.min.css" />

    <h:outputStylesheet name="primeflex/primeflex.css" />

</h:head>

<h:body>
    <div>
        <h:form>
            <p:menubar id="menuBar">

                <!-- LEFT SIDE -->
<!--                <f:facet name="start">-->
<!--                    <h:panelGroup layout="inline">-->
<!--                        <i class="pi pi-book" style="font-size:1.6em; vertical-align:middle; color:var(&#45;&#45;text-color);"/>-->
<!--                    </h:panelGroup>-->
<!--                </f:facet>-->

                <!-- MENU -->

                <p:menuitem value="Home" icon="pi pi-compass" outcome="/index.xhtml?faces-redirect=true"/>
                <p:menuitem value="Profile" icon="pi pi-user" outcome="/profile.xhtml?faces-redirect=true"/>

                <p:divider layout="vertical"/>


                <p:submenu label="Books" icon="pi pi-book">

                    <p:menuitem value="View Books"
                                outcome="/book/list.xhtml"/>

                    <p:menuitem value="Register new"
                                outcome="/book/register.xhtml"/>

                </p:submenu>

                <p:submenu label="Authors" icon="pi pi-user">

                    <p:menuitem value="View Authors"
                                outcome="/author/list.xhtml"/>

                    <p:menuitem value="Register new"
                                outcome="/author/register.xhtml"/>

                </p:submenu>

                <!-- RIGHT SIDE -->
                <f:facet name="end">
                    <h:panelGroup>
                        <i class="pi pi-moon" style="margin-right: 0.5rem;"/>
                        <p:selectOneMenu value="#{themeBean.theme}" style="margin-right:1rem;">

                            <f:selectItems value="#{themeBean.themes}" />

                            <p:ajax update="@all" />
                        </p:selectOneMenu>


                        <p:commandButton value="Login"
                                         style="margin-left: 0.5rem;"
                                         rendered="#{not userBean.loggedIn}"
                                         icon="pi pi-sign-in"
                                         ajax="false"
                                         action="/secure.xhtml?faces-redirect=true" />

                        <p:commandButton value="Logout"
                                         style="margin-left: 0.5rem;"
                                         rendered="#{userBean.loggedIn}"
                                         icon="pi pi-sign-out"
                                         ajax="false"
                                         action="#{authBean.logout}" />
                    </h:panelGroup>
                </f:facet>
            </p:menubar>
        </h:form>
    </div>

    <ui:insert name="header"/>

    <ui:insert name="content"/>
</h:body>
</html>
