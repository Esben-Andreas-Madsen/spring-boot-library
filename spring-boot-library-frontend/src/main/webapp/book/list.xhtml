<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">
        Library - Book List
    </ui:define>

    <ui:define name="content">

        <p:dataTable value="#{bookListBean.books}" var="book"
                     paginator="true"
                     rows="10"
                     lazy="true"
                     rowKey="#{book.id}"
                     emptyMessage="No books found"
        >

            <p:column headerText="ID">
                #{book.id}
            </p:column>

            <p:column headerText="Title">
                #{book.title}
            </p:column>

            <p:column headerText="Authors">
                <ui:repeat value="#{bookListBean.getAuthorsByIds(book.authorIds)}" var="author">
                    <p>#{author.name}</p>
                </ui:repeat>
            </p:column>

            <p:column headerText="Genres">
                <ui:repeat value="#{bookListBean.getGenresByIds(book.genreIds)}" var="genre">
                    <p>#{genre.name}</p>
                </ui:repeat>
            </p:column>

            <p:column headerText="Language">
                #{book.language}
            </p:column>

            <p:column headerText="Published">
                #{book.publishedYear}
            </p:column>

            <p:column headerText="ISBN">
                #{book.isbn}
            </p:column>

            <p:column headerText="Pages">
                #{book.pages}
            </p:column>

            <!--
            <p:column headerText="DEBUG">
                #{book}
            </p:column>
            -->
        </p:dataTable>

    </ui:define>

</ui:composition>
</html>
